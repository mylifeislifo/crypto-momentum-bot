mode: backtest
exchange: upbit
dry_run: true

universe:
  market: KRW
  top_n: 10
  by: quote_volume_24h
  refresh_hours: 12

data:
  interval: minute5
  lookback_days: 180
  cache_dir: data/upbit

strategy:
  name: momentum_trend
  params:
    ema_fast: 20
    ema_slow: 60
    atr_period: 14
    adx_period: 14
    adx_min: 20
    donchian_period: 20
    vol_ratio_min: 1.2
    momentum_lookback: 12
    reentry_cooldown_hours: 24

regime:
  source_symbol: KRW-BTC
  source_interval: minute60
  ema_fast: 50
  ema_slow: 200

risk:
  risk_per_trade: 0.015
  atr_stop_mult: 2.0
  trail_atr_mult: 3.0
  time_stop_hours: 48
  max_concurrent: 4
  max_concentration: 0.25
  daily_loss_limit: -0.03
  weekly_loss_limit: -0.08
  mdd_killswitch: -0.25

execution:
  fee_per_side: 0.0005
  slippage_bps: 5
  retry_max: 3
  retry_backoff_sec: 1.0

backtest:
  start: "2024-01-01"
  end: "2025-12-31"
  initial_equity: 10000000

walkforward:
  is_months: 6
  oos_months: 1
  step_months: 1

logging:
  level: INFO
  json: true
  dir: logs
