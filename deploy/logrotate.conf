# macOS logrotate config for btcbot
# Install: brew install logrotate
# Add to crontab: 0 9 * * * /usr/local/bin/logrotate /path/to/for_claude/deploy/logrotate.conf
#
# Replace YOURUSER with your macOS username.

/Users/YOURUSER/for_claude/logs/btcbot.log
/Users/YOURUSER/for_claude/logs/btcbot_err.log {
    daily
    rotate 30          # keep 30 days of logs
    compress
    delaycompress
    missingok
    notifempty
    copytruncate       # truncate in-place; avoids need to restart the process
    dateext
    dateformat -%Y%m%d
}
